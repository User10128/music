<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Play</title>

    <link rel="icon" href="/favicon.png" />

    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SortableJS for Drag and Drop Widgets -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Outfit", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
          },
        },
      };
    </script>

    <style>
      /* Light, airy background transition */
      #bg-container {
        transition: background-image 0.5s ease-in-out;
      }

      /* Dark glassmorphism */
      .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }

      .glass-btn {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #e2e8f0;
        transition: all 0.2s ease;
      }
      .glass-btn:hover {
        background: rgba(30, 41, 59, 0.9);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      /* Hide tabs smoothly */
      .tab-content {
        display: none;
        animation: fadeIn 0.3s ease forwards;
      }
      .tab-content.active {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Nav active state */
      .nav-item.active {
        color: #2dd4bf; /* Teal 400 */
      }

      select option {
        background-color: #0f172a;
        color: #f1f5f9;
      }

      /* Widget Edit Mode Styles */
      .widget-item {
        transition: transform 0.2s;
      }
      .edit-mode .widget-item {
        outline: 2px dashed rgba(45, 212, 191, 0.5);
        outline-offset: 4px;
        border-radius: 1.5rem;
        cursor: grab;
      }
      .edit-mode .widget-item:active {
        cursor: grabbing;
      }
      .widget-controls {
        display: none;
      }
      .edit-mode .widget-controls {
        display: flex;
      }
      /* Disable interaction inside widgets when editing so you can grab anywhere */
      .edit-mode .widget-content {
        pointer-events: none;
        opacity: 0.7;
      }
    </style>
  </head>
  <body
    class="bg-slate-950 text-slate-200 overflow-hidden select-none font-sans h-screen w-screen relative flex flex-col"
  >
    <!-- Dark, Immersive Background -->
    <div
      id="bg-container"
      class="absolute inset-0 w-full h-full bg-cover bg-center z-0"
      style="
        background-image: url('https://photographylife.com/wp-content/uploads/2016/06/Mass.jpg');
      "
    ></div>
    <div
      class="absolute inset-0 bg-slate-950/70 backdrop-blur-[2px] z-10 pointer-events-none"
    ></div>

    <!-- Toast Notification Container -->
    <div
      id="toast-container"
      class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 w-full max-w-md px-4 pointer-events-none"
    ></div>

    <!-- MAIN APP CONTAINER -->
    <main class="flex-1 relative z-20 overflow-hidden flex flex-col pb-20">
      <!-- ==================== TAB 1: HOME ==================== -->
      <div
        id="tab-home"
        class="tab-content flex-col h-full p-4 lg:p-8 overflow-y-auto"
      >
        <div class="max-w-5xl w-full mx-auto pb-10">
          <div class="flex justify-between items-center mb-6 px-2">
            <h1 class="text-3xl font-serif text-slate-100">Dashboard</h1>
            <button
              id="btn-toggle-edit"
              class="glass-btn px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2 text-teal-400"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                />
              </svg>
              <span>Edit Dashboard</span>
            </button>
          </div>

          <!-- Dashboard Grid -->
          <div id="home-widget-container" class="flex flex-col gap-6">
            <!-- Widgets dynamically injected here -->
          </div>

          <!-- Add Widget Button (Visible in Edit Mode) -->
          <div id="add-widget-zone" class="hidden mt-6 flex justify-center">
            <button
              id="btn-add-widget-modal"
              class="border-2 border-dashed border-teal-500/50 hover:bg-teal-900/30 text-teal-400 px-6 py-4 rounded-3xl font-medium transition-all w-full md:w-auto flex items-center justify-center gap-2"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 4v16m8-8H4"
                />
              </svg>
              Add Widget
            </button>
          </div>
        </div>
      </div>

      <!-- Add Widget Selection Modal -->
      <div
        id="widget-selection-modal"
        class="hidden absolute inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-6"
      >
        <div
          class="bg-slate-900 border border-white/10 rounded-3xl p-6 w-full max-w-lg shadow-2xl transform transition-all flex flex-col max-h-full"
        >
          <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-serif text-slate-100">Available Widgets</h3>
            <button
              id="btn-close-widget-modal"
              class="text-slate-400 hover:text-white p-2 rounded-lg bg-slate-800"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>

          <div
            id="available-widgets-list"
            class="space-y-3 overflow-y-auto flex-1 min-h-0 pr-2"
          >
            <!-- Available widgets injected here -->
          </div>
        </div>
      </div>

      <!-- ==================== TAB 2: LIBRARY ==================== -->
      <div
        id="tab-library"
        class="tab-content flex-col h-full p-6 max-w-4xl mx-auto w-full"
      >
        <div
          class="glass-panel rounded-3xl flex-1 flex flex-col overflow-hidden"
        >
          <div
            class="p-6 border-b border-white/10 bg-slate-900/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 backdrop-blur-md"
          >
            <div>
              <h2 class="text-2xl font-serif text-slate-100">Your Library</h2>
              <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">
                Manage Playlists
              </p>
            </div>
            <div class="flex items-center gap-2">
              <select
                id="album-selector"
                class="glass-btn text-slate-200 text-sm rounded-xl px-3 py-2 focus:outline-none cursor-pointer w-32 sm:w-auto truncate"
              ></select>
              <button
                id="btn-rename-album"
                class="glass-btn p-2 rounded-xl text-slate-400 hover:text-teal-400"
                title="Rename Playlist"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-4 w-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                  />
                </svg>
              </button>
              <button
                id="btn-new-album"
                class="glass-btn px-3 py-2 rounded-xl text-teal-300 text-sm font-medium hover:bg-slate-800"
              >
                + New
              </button>
            </div>
          </div>

          <!-- Rename Panel (Hidden by default) -->
          <div
            id="album-rename-container"
            class="hidden p-4 bg-slate-800/80 border-b border-white/10 flex items-center justify-center gap-2"
          >
            <input
              id="input-album-name"
              type="text"
              class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-teal-500 w-64 shadow-sm"
              placeholder="Playlist Name"
            />
            <button
              id="btn-save-album-name"
              class="bg-teal-600 hover:bg-teal-500 text-white font-medium px-4 py-2 rounded-lg text-sm transition-all shadow-sm"
            >
              Save
            </button>
            <button
              id="btn-cancel-album-name"
              class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium px-4 py-2 rounded-lg text-sm transition-all shadow-sm"
            >
              Cancel
            </button>
          </div>

          <div class="p-6 flex-1 overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
              <h4
                class="text-xs uppercase tracking-widest text-slate-400 font-semibold"
              >
                Tracks
              </h4>
              <button
                id="btn-delete-album"
                class="text-rose-400 hover:text-rose-300 text-xs font-medium hidden glass-btn px-3 py-1 rounded-lg"
              >
                Delete Playlist
              </button>
            </div>
            <div id="library-tracks-list" class="space-y-2">
              <!-- Tracks render here -->
            </div>
          </div>
        </div>
      </div>

      <!-- ==================== TAB 3: SEARCH ==================== -->
      <div
        id="tab-search"
        class="tab-content flex-col h-full p-6 max-w-4xl mx-auto w-full"
      >
        <div
          class="glass-panel rounded-3xl flex-1 flex flex-col p-6 overflow-hidden"
        >
          <h2 class="text-2xl font-serif text-slate-100 mb-6">Find Songs</h2>

          <!-- Songs Search View -->
          <div id="search-songs-view" class="flex-1 flex flex-col min-h-0">
            <div class="flex gap-2 mb-4 shrink-0">
              <input
                id="input-search-query"
                type="text"
                placeholder="Search YouTube for relaxing songs..."
                class="flex-1 bg-slate-800/70 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-all shadow-inner"
              />
              <button
                id="btn-search-yt"
                class="bg-teal-600 hover:bg-teal-500 text-white font-medium px-6 py-3 rounded-xl text-sm transition-all shadow-md active:scale-95"
              >
                Search
              </button>
            </div>

            <div
              id="search-feedback"
              class="hidden text-xs text-rose-400 mb-2 shrink-0"
            ></div>

            <div class="flex-1 overflow-y-auto pr-2 min-h-0">
              <div id="search-results" class="space-y-3">
                <div
                  class="h-full flex flex-col items-center justify-center text-slate-500"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-12 w-12 mb-3 opacity-50"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="1.5"
                      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                    />
                  </svg>
                  <p>Search results will appear here</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Add To Playlist Modal (Overlay within main) -->
      <div
        id="add-to-playlist-modal"
        class="hidden absolute inset-0 bg-slate-950/60 backdrop-blur-sm z-50 flex items-center justify-center p-6"
      >
        <div
          class="bg-slate-900 border border-white/10 rounded-3xl p-6 w-full max-w-sm shadow-2xl transform transition-all"
        >
          <h3 class="text-lg font-bold text-slate-100 mb-1">Add to Playlist</h3>
          <p
            id="add-track-preview"
            class="text-sm text-slate-400 truncate mb-5"
          ></p>

          <input type="hidden" id="add-hidden-ytid" />
          <input type="hidden" id="add-hidden-title" />
          <input type="hidden" id="add-hidden-desc" />

          <label
            class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2"
            >Select Destination</label
          >
          <select
            id="add-target-album"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-slate-100 focus:outline-none focus:border-teal-500 mb-6"
          ></select>

          <div class="flex gap-3">
            <button
              id="btn-cancel-add"
              class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium py-3 rounded-xl text-sm transition-all"
            >
              Cancel
            </button>
            <button
              id="btn-confirm-add"
              class="flex-1 bg-teal-600 hover:bg-teal-500 text-white font-medium py-3 rounded-xl text-sm transition-all shadow-md"
            >
              Add Track
            </button>
          </div>
        </div>
      </div>

      <!-- ==================== TAB 4: NOW PLAYING ==================== -->
      <div
        id="tab-now-playing"
        class="tab-content flex-col h-full p-4 lg:p-8 overflow-y-auto"
      >
        <div
          class="max-w-5xl w-full mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch h-full min-h-0"
        >
          <!-- Left: Video & Main Info -->
          <div class="flex flex-col gap-6 w-full min-h-0">
            <!-- The YouTube Player Wrapper (No pointer-events-none overlay to satisfy YouTube API ToS) -->
            <div
              class="glass-panel rounded-3xl overflow-hidden aspect-video relative shadow-xl border border-white/10 shrink-0"
            >
              <div id="player" class="absolute inset-0 w-full h-full"></div>
              <!-- Overlay when no video is active to keep aesthetic. Is completely bypassed when playing. -->
              <div
                id="player-placeholder"
                class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center pointer-events-none"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-16 w-16 text-slate-500 animate-pulse"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1"
                    d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1"
                    d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                  />
                </svg>
              </div>
            </div>

            <!-- Track Metadata & Transport -->
            <div
              class="glass-panel rounded-3xl p-6 relative overflow-hidden shrink-0"
            >
              <div class="mb-6 flex items-center justify-between gap-4">
                <div class="truncate text-left flex-1">
                  <h2
                    id="np-title"
                    class="text-2xl font-bold text-slate-100 truncate mb-1"
                  >
                    Nothing Playing
                  </h2>
                  <p
                    id="np-desc"
                    class="text-sm text-teal-400 font-serif italic truncate"
                  >
                    Select a track from your library
                  </p>
                </div>
                <!-- YouTube ToS compliance referral watch-on-platform link -->
                <a
                  id="np-yt-link"
                  href="#"
                  target="_blank"
                  class="p-3 text-slate-400 hover:text-red-500 hover:bg-slate-800/60 rounded-2xl transition shrink-0 hidden flex items-center justify-center"
                  title="Watch on YouTube"
                >
                  <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path
                      d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.518 3.545 12 3.545 12 3.545s-7.518 0-9.388.508a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 0 0 2.11 2.11c1.87.508 9.388.508 9.388.508s7.518 0 9.388-.508a3.003 3.003 0 0 0 2.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
                    />
                  </svg>
                </a>
              </div>

              <!-- Progress Bar -->
              <div class="mb-6">
                <input
                  id="np-progress"
                  type="range"
                  min="0"
                  max="100"
                  value="0"
                  step="0.1"
                  class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-teal-500 focus:outline-none shadow-inner"
                />
                <div class="flex justify-between mt-2">
                  <span
                    id="np-time-current"
                    class="text-xs text-slate-400 font-mono"
                    >0:00</span
                  >
                  <span
                    id="np-time-duration"
                    class="text-xs text-slate-400 font-mono"
                    >0:00</span
                  >
                </div>
              </div>

              <!-- Main Controls -->
              <div class="flex items-center justify-center gap-6">
                <button
                  id="np-btn-prev"
                  class="p-3 text-slate-400 hover:text-slate-100 transition transform hover:scale-110 active:scale-95"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-8 w-8"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                  </svg>
                </button>

                <button
                  id="np-btn-play"
                  class="w-16 h-16 rounded-full bg-teal-600 text-white flex items-center justify-center hover:bg-teal-500 shadow-lg transition transform hover:scale-105 active:scale-95"
                >
                  <svg
                    id="np-icon-play"
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-8 w-8 ml-1"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path d="M8 5v14l11-7z" />
                  </svg>
                  <svg
                    id="np-icon-pause"
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-8 w-8 hidden"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                  </svg>
                </button>

                <button
                  id="np-btn-next"
                  class="p-3 text-slate-400 hover:text-slate-100 transition transform hover:scale-110 active:scale-95"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-8 w-8"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Right: Options, Lyrics, and Add To -->
          <div class="flex flex-col gap-4 h-full min-h-0">
            <!-- Options Row -->
            <div class="grid grid-cols-2 gap-4 shrink-0">
              <button
                id="np-btn-add"
                class="glass-panel glass-btn py-4 rounded-3xl flex flex-col items-center justify-center gap-2 text-slate-300"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6 text-teal-400"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 4v16m8-8H4"
                  />
                </svg>
                <span class="text-sm font-medium">Add to Playlist</span>
              </button>
              <button
                id="np-btn-lyrics-toggle"
                class="glass-panel glass-btn py-4 rounded-3xl flex flex-col items-center justify-center gap-2 text-slate-300"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6 text-teal-400"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                  />
                </svg>
                <span class="text-sm font-medium">Lyrics</span>
              </button>
            </div>

            <!-- Lyrics Container -->
            <div
              class="glass-panel rounded-3xl flex-1 flex flex-col overflow-hidden relative min-h-0"
            >
              <div
                class="p-4 border-b border-white/10 bg-slate-900/50 backdrop-blur-md sticky top-0 z-10 flex justify-between items-center shrink-0"
              >
                <h3 class="font-serif font-bold text-slate-100">Lyrics</h3>
                <div
                  class="w-2 h-2 rounded-full bg-teal-400 animate-pulse hidden"
                  id="lyrics-loading-dot"
                ></div>
              </div>
              <div
                id="lyrics-content"
                class="p-6 overflow-y-auto flex-1 text-slate-300 font-serif leading-loose text-lg"
              >
                <div
                  class="h-full flex items-center justify-center text-center opacity-50 text-sm font-sans"
                >
                  Click 'Lyrics' to load lyrics for the current song.
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- ==================== BOTTOM NAVIGATION (4 Tabs) ==================== -->
    <nav
      class="absolute bottom-0 w-full h-20 glass-panel border-t border-white/10 z-40 flex items-center justify-around px-2 sm:px-6 shadow-[0_-10px_40px_rgba(0,0,0,0.2)]"
    >
      <button
        onclick="switchTab('home')"

        const possible =
          "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        const values = crypto.getRandomValues(new Uint8Array(length));
        return values.reduce(
          (acc, x) => acc + possible[x % possible.length],

        );

      const sha256 = async (plain) => {
        const encoder = new TextEncoder();
        const data = encoder.encode(plain);
        return window.crypto.subtle.digest("SHA-256", data);
      };

      const base64encode = (input) => {
        return btoa(String.fromCharCode(...new Uint8Array(input)))
          .replace(/=/g, "")

      // Robust Toast Notifications

        toastContainer.appendChild(toast);

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            toast.classList.remove("-translate-y-8", "opacity-0");

      // Process Spotify OAuth Redirect (PKCE)
      async function checkSpotifyAuth() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get("code");

        if (code) {
          const codeVerifier = sessionStorage.getItem("code_verifier");

          try {
            const response = await fetch(
              "https://accounts.spotify.com/api/token",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/x-www-form-urlencoded",
                },
                body: new URLSearchParams({
                  client_id: SPOTIFY_CLIENT_ID,
                  grant_type: "authorization_code",
                  code: code,
                  redirect_uri: SPOTIFY_REDIRECT_URI,
                  code_verifier: codeVerifier,
                }),
              }
            );

            const data = await response.json();

            if (data.access_token) {
              sessionStorage.setItem("spotify_token_v2", data.access_token); // Update token version
              window.history.replaceState(
                {},
                document.title,
                SPOTIFY_REDIRECT_URI
              ); // Clean URL
              showToast("Spotify connected successfully!", "success");
              renderHomeWidgets(); // Refresh button text
            } else if (data.error) {
              console.error("Spotify Auth Error:", data);
              showToast("Failed to link Spotify account.", "error");
            }
          } catch (e) {
            console.error("Auth token exchange failed", e);
          }
        }
      }

      // --- Spotify Sync Logic Integration ---
      window.startSpotifySync = async function () {
        let token = sessionStorage.getItem("spotify_token_v2");

        if (!token) {
          const scopes =
            "user-library-read playlist-read-private playlist-read-collaborative playlist-modify-private playlist-modify-public";

          const codeVerifier = generateRandomString(64);
          sessionStorage.setItem("code_verifier", codeVerifier);

          const hashed = await sha256(codeVerifier);
          const codeChallenge = base64encode(hashed);

          const authUrl = new URL("https://accounts.spotify.com/authorize");
          const params = {
            response_type: "code",
            client_id: SPOTIFY_CLIENT_ID,
            scope: scopes,
            code_challenge_method: "S256",
            code_challenge: codeChallenge,
            redirect_uri: SPOTIFY_REDIRECT_URI,
          };

          authUrl.search = new URLSearchParams(params).toString();
          window.location.href = authUrl.toString();
          return;
        }

        const statusEl = document.getElementById("spotify-sync-status");
        if (statusEl) {
          statusEl.classList.remove("hidden");
          statusEl.innerText = "Syncing... Please wait.";
        }

        try {
          // 1. Get Spotify User ID safely
          const meRes = await fetch("https://api.spotify.com/v1/me", {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (meRes.status === 401) {
            sessionStorage.removeItem("spotify_token_v2");
            startSpotifySync();
            return;
          }

          let pullCount = 0;

          // --- SMART CACHING ---
          // Pre-scan all local albums to save API quota on tracks we already know the YT ID for.
          const ytCache = {};
          const getCacheKey = (title, desc) =>
            `${title} ${desc}`.toLowerCase().replace(/[^a-z0-9]/g, "");

          albums.forEach((a) => {
            if (a.tracks) {
              a.tracks.forEach((t) => {
                if (t.id && t.id !== "jfKfPfyJRdk") {
                  const cleanTitle = t.title
                    .replace(" (Missing YT ID)", "")
                    .trim();
                  ytCache[getCacheKey(cleanTitle, t.desc)] = t.id;
                }
              });
            }
          });

          // --- 2a. PULL LIKED SONGS (Up to 300) ---
          try {
            if (statusEl)
              statusEl.innerText =
                "Pulling Liked Songs (this may take a moment)...";

            const localLiked = {
              id: "sp-liked",
              name: "Liked Songs (Spotify)",
              tracks: [],
              isPublic: true,
            };

            let offset = 0;
            let fetchedCount = 0;
            const MAX_LIKED_SONGS = 300;
            let hasMoreLiked = true;

            while (hasMoreLiked && fetchedCount < MAX_LIKED_SONGS) {
              const spLikedRes = await fetch(
                `https://api.spotify.com/v1/me/tracks?limit=50&offset=${offset}`,
                {
                  headers: { Authorization: `Bearer ${token}` },
                }
              );

              if (!spLikedRes.ok) break;

              const spLikedData = await spLikedRes.json();

              if (spLikedData.items && spLikedData.items.length > 0) {
                for (const item of spLikedData.items) {
                  if (fetchedCount >= MAX_LIKED_SONGS) break;

                  if (
                    item.track &&
                    item.track.artists &&
                    item.track.artists.length > 0
                  ) {
                    const trackName = item.track.name;
                    const trackArtist = item.track.artists[0].name;

                    // Deduplicate internally within this specific fetch loop based on Spotify's Title and Artist
                    const isInternalDup = localLiked.tracks.some(
                      (t) =>
                        t.title.replace(" (Missing YT ID)", "").trim() ===
                          trackName && t.desc === trackArtist
                    );

                    if (!isInternalDup) {
                      const cacheKey = getCacheKey(trackName, trackArtist);
                      let targetId = ytCache[cacheKey];

                      if (!targetId) {
                        const ytTrack = await searchYouTubeAPI(
                          `${trackName} ${trackArtist}`
                        );
                        if (ytTrack) {
                          targetId = ytTrack.id;
                          ytCache[cacheKey] = targetId; // Save to cache immediately to prevent future API calls
                        }
                      }

                      if (targetId) {
                        localLiked.tracks.push({
                          id: targetId,
                          title: trackName, // Store exactly as Spotify has it for cleanliness
                          desc: trackArtist,
                        });
                      } else {
                        // If API fails or no match, assign fallback but preserve Spotify Title to avoid deduplication bugs
                        localLiked.tracks.push({
                          id: "jfKfPfyJRdk",
                          title: trackName + " (Missing YT ID)",
                          desc: trackArtist,
                        });
                      }
                    }
                    fetchedCount++;
                  }
                }
                offset += 50;
                if (!spLikedData.next) hasMoreLiked = false;
              } else {
                hasMoreLiked = false;
              }
            }

            if (localLiked.tracks.length > 0) {
              const existingIdx = albums.findIndex(
                (a) => a.id === localLiked.id
              );
              if (existingIdx >= 0) {
                // Safely merge based on exact Title and Artist, so fallback tracks aren't erased
                localLiked.tracks.forEach((newTrack) => {
                  const cleanNewTitle = newTrack.title
                    .replace(" (Missing YT ID)", "")
                    .trim();
                  const isDup = albums[existingIdx].tracks.some((t) => {
                    const cleanTTitle = t.title
                      .replace(" (Missing YT ID)", "")
                      .trim();
                    // It's a duplicate if the text matches OR if the ID matches (and it's not the generic fallback ID)
                    return (
                      (cleanTTitle === cleanNewTitle &&
                        t.desc === newTrack.desc) ||
                      (t.id === newTrack.id && newTrack.id !== "jfKfPfyJRdk")
                    );
                  });

                  if (!isDup) {
                    albums[existingIdx].tracks.push(newTrack);
                  }
                });
              } else {
                albums.push(localLiked);
              }
              pullCount++;
            }
          } catch (e) {
            console.error("Skipped Liked Songs Pull (Permissions issue?)", e);

          // --- 2b. PULL STANDARD PLAYLISTS ---
          let plOffset = 0;
          let hasMorePlaylists = true;

          while (hasMorePlaylists) {
            const spPlRes = await fetch(
              `https://api.spotify.com/v1/me/playlists?limit=50&offset=${plOffset}`,
              {
                headers: { Authorization: `Bearer ${token}` },
              }
            );
            const spPlData = await spPlRes.json();

            if (spPlData.items && spPlData.items.length > 0) {
              for (const spPl of spPlData.items) {
                if (!spPl || !spPl.name || spPl.name.startsWith("Relax&Focus:"))
                  continue;

                // Update UI status to prevent user from thinking the app is frozen
                if (statusEl)
                  statusEl.innerText = `Pulling playlist: ${spPl.name}...`;

                const localAlbum = {
                  id: "sp-" + spPl.id,
                  name: `${spPl.name} (Spotify)`,
                  tracks: [],
                  isPublic: true,
                };

                // Limit increased to 100 per playlist
                const tracksRes = await fetch(
                  `https://api.spotify.com/v1/playlists/${spPl.id}/tracks?limit=100`,
                  {
                    headers: { Authorization: `Bearer ${token}` },
                  }
                );
                const tracksData = await tracksRes.json();

                if (tracksData.items) {
                  for (const item of tracksData.items) {
                    if (
                      item.track &&
                      item.track.artists &&
                      item.track.artists.length > 0
                    ) {
                      const trackName = item.track.name;
                      const trackArtist = item.track.artists[0].name;

                      // Internal deduplication check
                      const isInternalDup = localAlbum.tracks.some(
                        (t) =>
                          t.title.replace(" (Missing YT ID)", "").trim() ===
                            trackName && t.desc === trackArtist
                      );

                      if (!isInternalDup) {
                        const cacheKey = getCacheKey(trackName, trackArtist);
                        let targetId = ytCache[cacheKey];

                        if (!targetId) {
                          const ytTrack = await searchYouTubeAPI(
                            `${trackName} ${trackArtist}`
                          );
                          if (ytTrack) {
                            targetId = ytTrack.id;
                            ytCache[cacheKey] = targetId;
                          }
                        }

                        if (targetId) {
                          localAlbum.tracks.push({
                            id: targetId,
                            title: trackName,
                            desc: trackArtist,
                          });
                        } else {
                          localAlbum.tracks.push({
                            id: "jfKfPfyJRdk",
                            title: trackName + " (Missing YT ID)",
                            desc: trackArtist,
                          });
                        }
                      }
                    }
                  }

                          .trim();
                        return (

                            t.desc === newTrack.desc) ||
                          (t.id === newTrack.id &&
                            newTrack.id !== "jfKfPfyJRdk")
                        );
                      });

                      if (!isDup) {
                        albums[existingIdx].tracks.push(newTrack);
                      }
                    });
                  } else {
                    albums.push(localAlbum);
                  }
                  pullCount++;
                }
              }
              plOffset += 50;
              if (!spPlData.next) hasMorePlaylists = false;
            } else {
              hasMorePlaylists = false;
            }

          renderLibrary();
          if (statusEl) statusEl.innerText = "Sync Complete!";
          showToast(
            `Sync Complete! Pulled ${pullCount} playlists from Spotify.`,

          );
        } catch (e) {
          console.error("Sync Process Error:", e);
          if (statusEl) statusEl.innerText = "Sync failed. Check console.";
          showToast(`Sync Error: ${e.message}`, "error");
        }
      };

      // Helper: Headless YouTube API caller for the Spotify -> Local sync

        try {
          const res = await fetch(
            `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(
              query
            )}&type=video&key=${apiKey}`
          );

          // Add explicit safety check against network/HTTP 403 limits
          if (!res.ok) {
            console.error("YouTube API HTTP Error:", res.status);
            return null;
          }

          const data = await res.json();

          if (data.error) {
            console.error("YouTube API Error Details:", data.error.message);
            return null;
          }

          if (data.items && data.items.length > 0) {
            const dummy = document.createElement("div");
            dummy.innerHTML = data.items[0].snippet.title;
            const cleanTitle = dummy.textContent || dummy.innerText;
            return {
              id: data.items[0].id.videoId,
              title: cleanTitle,
              desc: data.items[0].snippet.channelTitle,
            };
          }
        } catch (e) {

        return null;

        .addEventListener("click", () => {
          const ytid = document.getElementById("add-hidden-ytid").value;
          const title = document.getElementById("add-hidden-title").value;
          const desc = document.getElementById("add-hidden-desc").value;
          const selectedAlbumIdx = parseInt(targetAlbumSelect.value);

          if (!albums[selectedAlbumIdx].tracks)
            albums[selectedAlbumIdx].tracks = [];
          albums[selectedAlbumIdx].tracks.push({ id: ytid, title, desc });

          if (selectedAlbumIdx === currentAlbumIndex) {
            renderLibrary();
            if (albums[currentAlbumIndex].tracks.length === 1) loadTrack(0);
          }

          saveCurrentAlbums();
          addModal.classList.add("hidden");
          switchTab("library");
        });

      // --- Now Playing Tab & Media Session API Logic ---
      function updateNowPlayingUI() {
        const track = getCurrentTrack();
        const ytLink = document.getElementById("np-yt-link");

        if (track) {
          document.getElementById("np-title").innerText = track.title;
          document.getElementById("np-desc").innerText = track.desc;
          document.getElementById("player-placeholder").classList.add("hidden");
          document.getElementById("lyrics-content").innerHTML =
            "<div class=\"h-full flex items-center justify-center text-center opacity-50 text-sm font-sans\">Click 'Lyrics' to load lyrics for the current song.</div>";

          // YouTube compliance watch link update
          if (ytLink) {
            ytLink.href = `https://www.youtube.com/watch?v=${track.id}`;
            ytLink.classList.remove("hidden");
          }

          // Set the Browser Media Session API so it shows up in Chrome/Android lockscreen
          if ("mediaSession" in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
              title: track.title,
              artist: track.desc,
              album: albums[currentAlbumIndex]
                ? albums[currentAlbumIndex].name
                : "Relax & Focus",
              artwork: [
                {
                  src: `https://img.youtube.com/vi/${track.id}/hqdefault.jpg`,
                  sizes: "480x360",
                  type: "image/jpeg",
                },
              ],
            });

            navigator.mediaSession.setActionHandler("play", playMusic);
            navigator.mediaSession.setActionHandler("pause", pauseMusic);
            navigator.mediaSession.setActionHandler("previoustrack", () =>
              document.getElementById("np-btn-prev").click()
            );
            navigator.mediaSession.setActionHandler("nexttrack", () =>
              document.getElementById("np-btn-next").click()
            );
          }
        } else {
          document.getElementById("np-title").innerText = "Nothing Playing";
          document.getElementById("np-desc").innerText =
            "Select a track from your library";
          document
            .getElementById("player-placeholder")
            .classList.remove("hidden");
          document.getElementById("np-time-current").innerText = "0:00";
          document.getElementById("np-time-duration").innerText = "0:00";
          document.getElementById("np-progress").value = 0;
          pauseMusic();

          if (ytLink) {
            ytLink.classList.add("hidden");
          }

          if ("mediaSession" in navigator) {
            navigator.mediaSession.metadata = null;
          }
        }
      }

      function loadTrack(index) {
        const playlist = getCurrentPlaylist();
        if (playlist.length === 0) return;

        currentTrackIndex = index;
        const track = playlist[index];
        updateNowPlayingUI();

        if (player && typeof player.loadVideoById === "function") {
          player.loadVideoById({ videoId: track.id });
        }
        renderLibrary();
      }

      // --- YouTube Player Init ---
      var tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      var firstScriptTag = document.getElementsByTagName("script")[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      let isScrubbing = false;

      function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? "0" : ""}${s}`;
      }

      window.onYouTubeIframeAPIReady = function () {
        const track = getCurrentTrack();
        player = new YT.Player("player", {
          height: "100%",
          width: "100%",
          videoId: track ? track.id : "",
          playerVars: {
            autoplay: 1,
            controls: 1, // Standard player controls to allow native actions & referrals
            disablekb: 0,
            modestbranding: 1,
            playsinline: 1,
            rel: 0,
            showinfo: 1,
          },
          events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
          },
        });
      };

      function onPlayerReady(event) {
        player.setVolume(50);

        const slider = document.getElementById("np-progress");
        slider.addEventListener("input", (e) => {
          isScrubbing = true;
          const dur = player.getDuration();
          if (dur)
            document.getElementById("np-time-current").innerText = formatTime(
              (e.target.value / 100) * dur
            );
        });
        slider.addEventListener("change", (e) => {
          const dur = player.getDuration();
          if (dur) player.seekTo((e.target.value / 100) * dur, true);
          isScrubbing = false;
        });

        setInterval(() => {
          if (
            isMusicPlaying &&
            player &&
            player.getCurrentTime &&
            !isScrubbing
          ) {
            const curr = player.getCurrentTime();
            const dur = player.getDuration();
            if (dur > 0) {
              document.getElementById("np-progress").value = (curr / dur) * 100;
              document.getElementById("np-time-current").innerText =
                formatTime(curr);
              document.getElementById("np-time-duration").innerText =
                formatTime(dur);
            }
          }
        }, 500);

        renderLibrary();
        updateNowPlayingUI();

        if (getCurrentTrack()) {
          player.cueVideoById({ videoId: getCurrentTrack().id });
        }
      }

      function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
          isMusicPlaying = true;
          document.getElementById("np-icon-play").classList.add("hidden");
          document.getElementById("np-icon-pause").classList.remove("hidden");
          document.getElementById("player-placeholder").classList.add("hidden"); // Enforce clean invisibility of custom static placeholders
          if ("mediaSession" in navigator)
            navigator.mediaSession.playbackState = "playing";
        } else if (event.data === YT.PlayerState.PAUSED) {
          isMusicPlaying = false;
          document.getElementById("np-icon-play").classList.remove("hidden");
          document.getElementById("np-icon-pause").classList.add("hidden");
          if ("mediaSession" in navigator)
            navigator.mediaSession.playbackState = "paused";
        } else if (event.data === YT.PlayerState.ENDED) {
          const pl = getCurrentPlaylist();
          if (currentTrackIndex + 1 < pl.length)
            loadTrack(currentTrackIndex + 1);
          else pauseMusic();
        }
      }

      // --- Playback Controls ---
      const btnPlay = document.getElementById("np-btn-play");

      function playMusic() {
        if (!getCurrentTrack()) {
          switchTab("library");
          return;
        }
        if (player && typeof player.playVideo === "function")
          player.playVideo();
      }

      function pauseMusic() {
        if (player && typeof player.pauseVideo === "function")
          player.pauseVideo();
      }

      btnPlay.addEventListener("click", () => {
        if (isMusicPlaying) pauseMusic();
        else playMusic();
      });

      document.getElementById("np-btn-prev").addEventListener("click", () => {
        const pl = getCurrentPlaylist();
        if (pl.length > 0)
          loadTrack((currentTrackIndex - 1 + pl.length) % pl.length);
      });

      document.getElementById("np-btn-next").addEventListener("click", () => {
        const pl = getCurrentPlaylist();
        if (pl.length > 0) loadTrack((currentTrackIndex + 1) % pl.length);
      });

      document.getElementById("np-btn-add").addEventListener("click", () => {
        const track = getCurrentTrack();
        if (track) openAddToPlaylistModal(track.id, track.title, track.desc);
      });

      // --- Lyrics Fetching ---
      document
        .getElementById("np-btn-lyrics-toggle")
        .addEventListener("click", async () => {
          const track = getCurrentTrack();
          const contentDiv = document.getElementById("lyrics-content");
          const loadDot = document.getElementById("lyrics-loading-dot");

          if (!track) {
            contentDiv.innerHTML =
              '<div class="h-full flex items-center justify-center text-center opacity-50 text-sm font-sans">Play a track to view lyrics.</div>';
            return;
          }

          contentDiv.innerHTML =
            '<div class="h-full flex items-center justify-center text-center opacity-50 text-sm font-sans animate-pulse">Searching for lyrics...</div>';
          loadDot.classList.remove("hidden");

          try {
            const query = encodeURIComponent(`${track.title} ${track.desc}`);
            const response = await fetch(
              `https://lrclib.net/api/search?q=${query}`
            );
            const data = await response.json();

            if (data && data.length > 0 && data[0].plainLyrics) {
              contentDiv.innerHTML = data[0].plainLyrics.replace(
                /\n/g,
                "<br><br>"
              );
            } else {
              const fallbackQuery = encodeURIComponent(track.title);
              const fallbackRes = await fetch(
                `https://lrclib.net/api/search?q=${fallbackQuery}`
              );
              const fallbackData = await fallbackRes.json();

              if (
                fallbackData &&
                fallbackData.length > 0 &&
                fallbackData[0].plainLyrics
              ) {
                contentDiv.innerHTML = fallbackData[0].plainLyrics.replace(
                  /\n/g,
                  "<br><br>"
                );
              } else {
                contentDiv.innerHTML =
                  '<div class="h-full flex items-center justify-center text-center text-rose-400/70 text-sm font-sans">No lyrics found for this track.</div>';
              }
            }
          } catch (error) {
            contentDiv.innerHTML =
              '<div class="h-full flex items-center justify-center text-center text-rose-400/70 text-sm font-sans">Failed to load lyrics. Try again later.</div>';
          } finally {
            loadDot.classList.add("hidden");
          }
        });

      // Run setup functions
      initLocalData();
      renderHomeWidgets();
      switchTab("now-playing");
      checkSpotifyAuth();
    </script>
  </body>
</html>
